# Alembic 설정. sqlalchemy.url은 env.py에서 앱 설정(get_settings)으로 주입한다.
[alembic]
script_location = alembic
prepend_sys_path = .
# 마이그레이션 파일명: 리비전ID_슬러그
file_template = %%(rev)s_%%(slug)s
# 타임존 인식 datetime 규칙(DTZ)과 무관 — Alembic 내부 타임스탬프용
timezone = UTC
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
