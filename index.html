<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>수능 국어 비문학 첨삭 LMS · 데모</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --line: #2a2f3a;
    --text: #e8eaf0;
    --muted: #99a1b3;
    --brand: #6d8bff;
    --brand-2: #9b7bff;
    --accent: #3ad0a0;
    --warn: #ffb454;
    --radius: 16px;
    --shadow: 0 10px 40px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Malgun Gothic", "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(1200px 600px at 80% -10%, #1b2030 0%, var(--bg) 55%) fixed;
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Header */
  header.top { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
  .logo {
    width: 44px; height: 44px; border-radius: 12px; flex: none;
    background: linear-gradient(135deg, var(--brand), var(--brand-2));
    display: grid; place-items: center; font-weight: 800; font-size: 20px; color: white;
    box-shadow: 0 6px 20px rgba(109,139,255,.45);
  }
  header.top h1 { font-size: 19px; margin: 0; letter-spacing: -.02em; }
  header.top p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }
  .pill {
    margin-left: auto; font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); padding: 6px 12px; border-radius: 999px;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 rgba(58,208,160,.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(58,208,160,.5)} 70%{box-shadow:0 0 0 8px rgba(58,208,160,0)} 100%{box-shadow:0 0 0 0 rgba(58,208,160,0)} }

  .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }

  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); overflow: hidden;
  }
  .card .hd { padding: 16px 20px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; }
  .card .hd .ic { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
    font-size: 14px; background: rgba(109,139,255,.16); color: var(--brand); }
  .card .hd h2 { font-size: 15px; margin: 0; letter-spacing: -.01em; }
  .card .hd .sub { font-size: 12px; color: var(--muted); margin-left: auto; }
  .card .bd { padding: 20px; }

  textarea {
    width: 100%; min-height: 190px; resize: vertical; padding: 14px 16px;
    background: #10131a; color: var(--text); border: 1px solid var(--line);
    border-radius: 12px; font-size: 14.5px; line-height: 1.7; font-family: inherit;
  }
  textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(109,139,255,.18); }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 14px; }
  button, .btn {
    font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    padding: 10px 16px; border-radius: 11px; transition: .15s; display: inline-flex;
    align-items: center; gap: 8px;
  }
  button:hover, .btn:hover { border-color: #3b425420; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--muted); }
  .btn-primary {
    border: none; color: white;
    background: linear-gradient(135deg, var(--brand), var(--brand-2));
    box-shadow: 0 8px 22px rgba(109,139,255,.4);
  }
  .btn-primary:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }
  .spacer { flex: 1 1 auto; }
  .chars { font-size: 12px; color: var(--muted); }

  /* Mode / settings row */
  .settings { display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .seg { display: inline-flex; background: #10131a; border: 1px solid var(--line); border-radius: 10px; padding: 3px; }
  .seg button { border: none; background: transparent; color: var(--muted); padding: 7px 14px; border-radius: 8px; font-size: 13px; }
  .seg button.active { background: var(--brand); color: #fff; }
  .settings input[type=text] { background:#10131a; border:1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 9px 12px; font-size: 13px; font-family: inherit; min-width: 220px; }
  .settings label { font-size: 12.5px; color: var(--muted); }
  .hidden { display: none !important; }

  /* Loading */
  .loading { display: flex; align-items: center; gap: 14px; color: var(--muted); font-size: 14px; padding: 8px 2px; }
  .bar { flex: 1; height: 6px; background: #10131a; border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 30%; border-radius: 999px;
    background: linear-gradient(90deg, var(--brand), var(--brand-2));
    animation: slide 1.1s infinite ease-in-out; }
  @keyframes slide { 0%{margin-left:-30%} 100%{margin-left:100%} }

  /* Results */
  #results { display: grid; gap: 20px; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
  .badge.domain { background: rgba(155,123,255,.16); color: #c3b1ff; }
  .badge.struct { background: rgba(58,208,160,.14); color: var(--accent); }
  .badge.conf { background: rgba(255,180,84,.14); color: var(--warn); }

  .ks-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .ks-item:last-child { border-bottom: none; }
  .ks-num { flex: none; width: 30px; height: 30px; border-radius: 9px; font-weight: 700; font-size: 13px;
    display: grid; place-items: center; background: rgba(109,139,255,.16); color: var(--brand); }
  .ks-text { font-size: 14.5px; }

  .sum-topic { font-size: 17px; font-weight: 700; letter-spacing: -.01em; margin: 2px 0 14px; }
  .sum-grid { display: grid; grid-template-columns: 88px 1fr; gap: 10px 16px; align-items: start; }
  .sum-grid .k { font-size: 12.5px; color: var(--muted); font-weight: 600; padding-top: 2px; }
  .sum-grid .v { font-size: 14px; }

  .vocab { display: grid; gap: 12px; }
  .vword { background: #10131a; border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; }
  .vword .w { font-size: 15px; font-weight: 700; color: #eaf0ff; margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
  .vword .w::before { content: "📖"; font-size: 14px; }
  .vword .row { display: grid; grid-template-columns: 74px 1fr; gap: 4px 12px; font-size: 13.5px; }
  .vword .row .lbl { color: var(--muted); font-size: 12px; padding-top: 2px; }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }
  .empty .big { font-size: 40px; margin-bottom: 10px; opacity: .8; }

  .err { background: rgba(255,90,90,.1); border: 1px solid rgba(255,90,90,.35); color: #ffb3b3;
    padding: 12px 16px; border-radius: 12px; font-size: 13.5px; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 40px; }
  .fadein { animation: fade .45s ease both; }
  @keyframes fade { from{opacity:0; transform: translateY(8px)} to{opacity:1; transform:none} }
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="logo">국</div>
    <div>
      <h1>수능 국어 비문학 첨삭 LMS</h1>
      <p>지문을 넣으면 · 문단별 중심문장 · 논리구조 요약 · 고난도 어휘 암기장을 생성합니다</p>
    </div>
    <div class="pill"><span class="dot"></span><span id="modeLabel">데모 모드</span></div>
  </header>

  <div class="grid">
    <!-- INPUT -->
    <section class="card">
      <div class="hd">
        <span class="ic">✍️</span>
        <h2>지문 입력</h2>
        <span class="sub">텍스트 붙여넣기 · 이미지/PDF는 후속 지원</span>
      </div>
      <div class="bd">
        <textarea id="passage" placeholder="여기에 수능 비문학(독서) 지문을 붙여넣으세요…"></textarea>

        <div class="toolbar">
          <button class="btn-ghost" id="sampleBtn">📄 샘플 지문 넣기</button>
          <button class="btn-ghost" id="clearBtn">✕ 지우기</button>
          <span class="spacer"></span>
          <span class="chars" id="chars">0자</span>
          <button class="btn-primary" id="analyzeBtn">✨ 분석하기</button>
        </div>

        <div class="settings">
          <div class="seg" id="modeSeg">
            <button data-mode="demo" class="active">데모(샘플)</button>
            <button data-mode="live">실서버 연결</button>
          </div>
          <div id="liveOpts" class="hidden" style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
            <label>API</label>
            <input type="text" id="apiBase" value="http://localhost:8000" />
            <label>JWT</label>
            <input type="text" id="token" placeholder="Bearer 토큰(로그인 후 발급)" />
          </div>
          <span class="spacer"></span>
          <span style="font-size:12px;color:var(--muted)">데모 모드는 서버 없이 즉시 시연됩니다</span>
        </div>
      </div>
    </section>

    <!-- STATUS -->
    <div id="status"></div>

    <!-- RESULTS -->
    <div id="results">
      <div class="card"><div class="bd empty">
        <div class="big">🧭</div>
        지문을 입력하고 <b>분석하기</b>를 누르면 결과가 여기에 표시됩니다.
      </div></div>
    </div>
  </div>

  <footer>
    Writing LMS · 데모 프리뷰 &nbsp;·&nbsp; 학습 산출물은 지문 텍스트 논리에 근거하여 생성됩니다
  </footer>
</div>

<script>
// ---------------------------------------------------------------------------
// 샘플 지문 + 목업 분석 결과 (실제 PassageAnalysis 스키마와 동일한 형태)
// ---------------------------------------------------------------------------
const SAMPLE_PASSAGE =
`(가) 경제 주체들이 미래를 예측하여 행동을 결정할 때, 이들이 가진 정보의 양과 질은 서로 다르다. 이러한 정보의 비대칭성은 시장에서 자원의 효율적 배분을 방해하는 요인으로 작용한다.

(나) 대표적인 사례가 중고차 시장이다. 판매자는 차량의 실제 상태를 알지만 구매자는 이를 정확히 알 수 없다. 그 결과 구매자는 평균적인 품질을 기준으로 가격을 지불하려 하고, 품질이 좋은 차량의 소유자는 시장에서 이탈하게 된다. 결국 시장에는 품질이 낮은 차량만 남는 '역선택'이 발생한다.

(다) 이러한 역선택을 완화하기 위한 장치로 '신호'와 '선별'이 있다. 정보를 가진 쪽이 자신의 우수함을 드러내는 것이 신호라면, 정보를 갖지 못한 쪽이 상대의 특성을 가려내려는 노력이 선별이다. 품질 보증서 발급은 신호의, 구매자의 성능 검사 요구는 선별의 예이다.

(라) 정보 비대칭이 완전히 해소될 수는 없지만, 이러한 장치들은 거래의 위험을 낮추고 시장의 신뢰를 회복하는 데 기여한다. 즉 정보의 격차를 줄이려는 제도적 노력이 시장의 효율성을 뒷받침하는 것이다.`;

const SAMPLE_RESULT = {
  classification: { domain: "경제·사회", confidence: 0.92 },
  analysis: {
    key_sentences: [
      { paragraph: 1, key_sentence: "정보의 비대칭성은 시장에서 자원의 효율적 배분을 방해하는 요인으로 작용한다." },
      { paragraph: 2, key_sentence: "정보 비대칭으로 인해 품질 낮은 차량만 남는 '역선택'이 발생한다." },
      { paragraph: 3, key_sentence: "역선택을 완화하는 장치로 정보를 드러내는 '신호'와 특성을 가려내는 '선별'이 있다." },
      { paragraph: 4, key_sentence: "정보 격차를 줄이려는 제도적 노력이 시장의 효율성을 뒷받침한다." }
    ],
    summary: {
      topic: "정보 비대칭이 시장에 미치는 영향과 이를 완화하는 장치",
      structure_type: "문제-해결",
      intro: "경제 주체 간 정보의 양과 질이 달라 발생하는 정보 비대칭이 자원 배분을 방해함을 제시한다.",
      body: "중고차 시장을 예로 역선택(원인)을 설명하고, 이를 완화하는 신호와 선별(해결책)을 대비하여 전개한다.",
      conclusion: "정보 격차를 줄이려는 제도적 노력이 거래 위험을 낮추고 시장 효율성을 뒷받침한다고 정리한다."
    },
    vocabulary: [
      { word: "비대칭성(非對稱性)", dictionary_meaning: "서로 대칭이 되지 않고 한쪽으로 치우쳐 있는 성질.", context_meaning: "거래 당사자들이 가진 정보의 양과 질이 서로 다른 상태." },
      { word: "역선택(逆選擇)", dictionary_meaning: "정보 부족으로 바람직하지 않은 대상이 선택되는 현상.", context_meaning: "품질 좋은 상품이 시장에서 빠지고 나쁜 상품만 남는 현상." },
      { word: "선별(選別)", dictionary_meaning: "가려서 따로 나눔.", context_meaning: "정보를 못 가진 쪽이 상대의 특성을 가려내려는 노력." },
      { word: "이탈(離脫)", dictionary_meaning: "어떤 범위나 대열에서 떨어져 나옴.", context_meaning: "좋은 품질의 차량 소유자가 시장에서 빠져나가는 것." },
      { word: "해소(解消)", dictionary_meaning: "어려운 일이나 문제가 되는 상태를 해결하여 없앰.", context_meaning: "정보의 격차를 줄여 없애는 것." }
    ]
  }
};

// ---------------------------------------------------------------------------
const $ = (s) => document.querySelector(s);
const passageEl = $("#passage");
const charsEl = $("#chars");
let mode = "demo";

passageEl.addEventListener("input", () => charsEl.textContent = passageEl.value.length + "자");

$("#sampleBtn").onclick = () => { passageEl.value = SAMPLE_PASSAGE; passageEl.dispatchEvent(new Event("input")); };
$("#clearBtn").onclick = () => { passageEl.value = ""; passageEl.dispatchEvent(new Event("input")); };

$("#modeSeg").querySelectorAll("button").forEach(b => b.onclick = () => {
  $("#modeSeg").querySelectorAll("button").forEach(x => x.classList.remove("active"));
  b.classList.add("active");
  mode = b.dataset.mode;
  $("#liveOpts").classList.toggle("hidden", mode !== "live");
  $("#modeLabel").textContent = mode === "live" ? "실서버 모드" : "데모 모드";
});

const STRUCT_MAP = {}; // (구조 유형은 그대로 표시)

function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function setStatus(html){ $("#status").innerHTML = html; }

function showLoading(){
  setStatus(`<div class="card"><div class="bd"><div class="loading">
    <span>🤖 지문을 분석하고 있어요… 중심문장 · 요약 · 어휘를 추출 중</span>
    <span class="bar"><i></i></span></div></div></div>`);
}

function renderError(msg){
  setStatus(`<div class="card"><div class="bd"><div class="err">⚠️ ${esc(msg)}</div></div></div>`);
}

function render(data){
  setStatus("");
  const c = data.classification || {};
  const a = data.analysis || {};
  const s = a.summary || {};
  const conf = c.confidence != null ? Math.round(c.confidence * 100) + "%" : "—";

  const ks = (a.key_sentences || []).map(k => `
    <div class="ks-item">
      <div class="ks-num">${k.paragraph}</div>
      <div class="ks-text">${esc(k.key_sentence)}</div>
    </div>`).join("");

  const vocab = (a.vocabulary || []).map(v => `
    <div class="vword">
      <div class="w">${esc(v.word)}</div>
      <div class="row"><span class="lbl">사전적</span><span>${esc(v.dictionary_meaning)}</span></div>
      <div class="row"><span class="lbl">문맥적</span><span>${esc(v.context_meaning)}</span></div>
    </div>`).join("");

  $("#results").innerHTML = `
    <section class="card fadein">
      <div class="hd"><span class="ic">🏷️</span><h2>도메인 분류</h2></div>
      <div class="bd" style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <span class="badge domain">📚 ${esc(c.domain || "일반")}</span>
        <span class="badge struct">🧩 ${esc(s.structure_type || "—")}</span>
        <span class="badge conf">확신도 ${conf}</span>
      </div>
    </section>

    <section class="card fadein">
      <div class="hd"><span class="ic">🎯</span><h2>문단별 중심 문장</h2>
        <span class="sub">${(a.key_sentences||[]).length}개 문단</span></div>
      <div class="bd">${ks || '<div class="empty">—</div>'}</div>
    </section>

    <section class="card fadein">
      <div class="hd"><span class="ic">🧠</span><h2>논리 구조 요약</h2></div>
      <div class="bd">
        <div class="sum-topic">💡 ${esc(s.topic || "")}</div>
        <div class="sum-grid">
          <div class="k">서론</div><div class="v">${esc(s.intro || "")}</div>
          <div class="k">본론</div><div class="v">${esc(s.body || "")}</div>
          <div class="k">결론</div><div class="v">${esc(s.conclusion || "")}</div>
        </div>
      </div>
    </section>

    <section class="card fadein">
      <div class="hd"><span class="ic">📒</span><h2>고난도 어휘 암기장</h2>
        <span class="sub">${(a.vocabulary||[]).length}개</span></div>
      <div class="bd"><div class="vocab">${vocab || '<div class="empty">—</div>'}</div></div>
    </section>`;
}

async function analyze(){
  const passage = passageEl.value.trim();
  if (!passage){ renderError("지문을 먼저 입력해 주세요."); return; }
  const btn = $("#analyzeBtn");
  btn.disabled = true; showLoading();

  try {
    if (mode === "demo"){
      await new Promise(r => setTimeout(r, 1400)); // 시연용 지연
      render(SAMPLE_RESULT);
    } else {
      const base = $("#apiBase").value.replace(/\/$/, "");
      const token = $("#token").value.trim();
      const res = await fetch(base + "/writing/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(token ? { "Authorization": "Bearer " + token } : {})
        },
        body: JSON.stringify({ passage })
      });
      if (!res.ok){
        const t = await res.text();
        throw new Error(`서버 응답 ${res.status}: ${t.slice(0,200)}`);
      }
      render(await res.json());
    }
  } catch(e){
    renderError(e.message || String(e));
  } finally {
    btn.disabled = false;
  }
}
$("#analyzeBtn").onclick = analyze;
